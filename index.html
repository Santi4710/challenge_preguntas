        /* --- BORDE ANIMADO --- */
        .card-glow-border {
            position: relative;
        }
        .card-glow-border::before {
            content: '';
            position: absolute;
            inset: -1.5px;
            border-radius: 24px;
            padding: 1.5px;
            background: linear-gradient(135deg, #6366f1, #22d3ee, #ec4899, #6366f1);
            background-size: 300% 300%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 10;
            animation: animate-border-gradient 8s linear infinite;
        }

        @keyframes animate-border-gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }

            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tight text-white">CHALLENGE! <span class="text-xs text-indigo-300">v2.3</span></h1>

            <button onclick="restartGame()" class="bg-slate-900 text-slate-300 p-2.5 rounded-xl border border-slate-800 text-xs font-bold shadow-md cursor-pointer">

                        <button onclick="showCustomGameSetup()" class="w-full btn-3d-cyan text-white font-extrabold py-3.5 px-4 rounded-xl cursor-pointer">Gestionar Configuración</button>
                    </div>
                </div>

                <div class="border-t border-slate-900 pt-6 space-y-6 text-center">
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest">Crear Partida (Host)</h4>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">

            </div>

            <div id="hostSetupScreen" class="game-screen hidden space-y-6 z-20">
                <h2 class="text-2xl font-extrabold text-white">Configurar Partida</h2>
                <div class="space-y-4 max-w-md mx-auto">
                    <input type="text" id="hostNameInput" placeholder="Nombre de Anfitrión" class="w-full bg-slate-900 border border-slate-800 text-white rounded-xl py-3.5 px-4 outline-none">
                    <input type="number" id="mpNumQuestions" value="10" class="w-full bg-slate-900 border border-slate-800 text-white rounded-xl py-3.5 px-4 outline-none">
                    <div id="hostSetupMessage" class="text-sm font-bold text-rose-400 text-center"></div>
                    <div class="flex gap-4">
                        <button id="createGameButton" class="flex-1 btn-3d-indigo text-white font-extrabold py-3.5 rounded-xl">Crear Partida</button>
                        <button onclick="restartGame()" class="btn-3d-slate text-slate-300 font-extrabold py-3.5 px-6 rounded-xl">Volver</button>
                    </div>
                </div>
            </div>

            <div id="questionScreen" class="game-screen hidden space-y-6 z-20">
                <div class="flex items-center justify-between bg-slate-900/40 border border-slate-900 p-4 rounded-2xl">
                    <div class="flex-1 bg-slate-950 h-5 rounded-full overflow-hidden border border-slate-900 p-0.5 shadow-inner">
                        <div id="timerProgress" class="h-full rounded-full transition-all duration-1000 ease-linear flex items-center justify-center text-[10px] font-black text-white bg-indigo-600" style="width: 100%;">15s</div>
                    </div>
                    <div id="currentScoreDisplay" class="ml-4 text-indigo-400 font-bold text-sm">Puntuación: 0</div>
                </div>
                <div id="questionText" class="bg-slate-900/50 border border-slate-800 rounded-3xl p-6 text-center text-lg font-bold text-white min-h-[100px] flex items-center justify-center">Cargando...</div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5" id="optionsContainer">
                    <button class="answer-button min-h-[60px] btn-3d-option rounded-2xl text-slate-100 flex items-center justify-center text-center px-4"></button>
                    <button class="answer-button min-h-[60px] btn-3d-option rounded-2xl text-slate-100 flex items-center justify-center text-center px-4"></button>
                    <button class="answer-button min-h-[60px] btn-3d-option rounded-2xl text-slate-100 flex items-center justify-center text-center px-4"></button>
                    <button class="answer-button min-h-[60px] btn-3d-option rounded-2xl text-slate-100 flex items-center justify-center text-center px-4"></button>
                </div>
                <div id="feedback" class="text-center font-black text-lg min-h-[28px]"></div>
                <div id="explanationContainer" class="hidden bg-slate-900/30 border border-slate-900 rounded-2xl p-5 text-sm text-slate-300"></div>
                <div class="flex items-center justify-between border-t border-slate-900 pt-4">
                    <p id="progressText" class="text-xs text-slate-400 font-bold uppercase">Pregunta -- de --</p>
                    <button id="endGameButton" onclick="endGame()" class="btn-3d-rose text-white font-bold py-2 px-4 rounded-xl text-xs">Finalizar</button>
                </div>
            </div>

        </div>
    </main>
